  title: "Does religious coping protect against suicide attempts?"
  description: "In this study of LGBTQ+ adults raised in a conservative religious tradition, reilgious coping did not broadly protect against suicide attempts. In fact, religious coping increased risk of suicide, and was only protective with those not religious or people of Color."
  url: "https://doi.org/10.1111/sltb.70088"

- date: "2025-09-26"
  title: "What is the state of LGBQ+ support among U.S. Religious Leaders?"
  description: "Using a nationally representative sample of 1,600 religious leaders, this study reveals overall low LGBQ+ support among U.S. religious leaders. Religious fundamentalism emerged as the strongest predictor of lower support, while factors like higher education and religious/spiritual struggles were associated with greater acceptance. The findings highlight a significant gap between religious leader attitudes and broader population trends toward LGBQ+ acceptance."
  url: "https://doi.org/10.1007/s13178-025-01192-7"

